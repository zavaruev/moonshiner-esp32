          unsigned long now = esphome::millis();

          auto pulse_valve = [PULSE_MS, now](float level, bool& active, unsigned long& next_time, auto output) {
            if (level <= 0.5f) {
              if (active) { output->turn_off(); active = false; }
            } else if (level >= 1022.5f) {
              if (!active) { output->turn_on(); active = true; }
            } else {
