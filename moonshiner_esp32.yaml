  # Pulse Mode Controller for Valves
  # Instead of PWM with short ON times at low values, we use fixed 500ms pulses
  # with variable intervals. This ensures the valve fully opens each time.
  # Formula: interval_ms = PULSE_WIDTH_MS * 1023 / value
